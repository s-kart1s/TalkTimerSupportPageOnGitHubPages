<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkTimer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            color: white;
            padding: 40px 20px;
        }

        h1 {
            font-size: 3.5em;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .subtitle {
            font-size: 1.2em;
            opacity: 0.85;
            margin-bottom: 50px;
        }

        .lang-label {
            font-size: 1em;
            opacity: 0.75;
            margin-bottom: 25px;
            letter-spacing: 0.05em;
        }

        .lang-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .lang-button {
            display: inline-block;
            padding: 20px 50px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 60px;
            font-size: 1.2em;
            font-weight: bold;
            border: 2px solid rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .lang-button:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .lang-button .flag {
            display: block;
            font-size: 2em;
            margin-bottom: 6px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>⏰ TalkTimer</h1>
        <p class="subtitle">Voice Countdown Timer App</p>
        <p class="lang-label">Please select your language / 言語を選択してください</p>
        <div class="lang-buttons">
            <a href="ja/index.html" class="lang-button">
                <span class="flag">🇯🇵</span>
                日本語
            </a>
            <a href="en/index.html" class="lang-button">
                <span class="flag">🇺🇸</span>
                English
            </a>
        </div>
    </div>
</body>

</html>
